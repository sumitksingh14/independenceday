<ngx-particles [id]="id" [options]="particlesOptions"></ngx-particles>
<app-navbar></app-navbar>
<main class="main-content" style="position: relative; z-index: 1;">
  <router-outlet></router-outlet>
</main>
<app-footer></app-footer>

<!-- Fixed Bottom Audio Bar -->
<div class="audio-bar">
  <div class="audio-bar-inner">
    <div class="audio-bar-label">
      <i class="fa-solid fa-music"></i>
      <span>Play Music</span>
    </div>
    <div class="audio-bar-controls">
      <button class="audio-btn" (click)="toggleMusic()" aria-label="Play/Pause Music">
        <i class="fa-solid" [ngClass]="(audioService.isPlaying$ | async) ? 'fa-pause' : 'fa-play'"></i>
      </button>
      <button class="audio-btn" (click)="audioService.toggleMute()" aria-label="Mute/Unmute">
        <i class="fa-solid" [ngClass]="(audioService.isMuted$ | async) ? 'fa-volume-xmark' : 'fa-volume-high'"></i>
      </button>
      <input type="range" class="audio-bar-slider" min="0" max="1" step="0.01" [value]="audioService.volume$ | async"
        (input)="onVolumeChange($event)" aria-label="Volume Control" />
    </div>
  </div>
</div>
