<section class="hero-section">
  <div class="hero-bg">
    <div class="overlay"></div>
    <!-- Use a good placeholder for the flag/Red fort -->
    <img src="https://images.unsplash.com/photo-1532375810709-75b1da00537c?q=80&w=2070&auto=format&fit=crop" alt="Indian Flag Background" class="bg-img parallax" />
  </div>

  <div class="hero-content">
    <div class="glass-card hero-card fade-in">
      <div class="chakra-wrapper">
        <i class="fa-solid fa-dharmachakra chakra-spin"></i>
      </div>
      <h1 class="main-title text-gradient">{{ t?.hero?.title || 'Happy Independence Day' }}</h1>
      <p class="subtitle">{{ t?.hero?.subtitle || 'Celebrating Freedom, Unity and Pride' }}</p>
      
      <div class="cta-group">
        <a routerLink="/history" class="btn btn-primary">{{ t?.hero?.exploreHistory || 'Explore History' }}</a>
        <a routerLink="/freedom-fighters" class="btn btn-secondary">{{ t?.hero?.freedomFighters || 'Freedom Fighters' }}</a>
      </div>
    </div>
  </div>
</section>
