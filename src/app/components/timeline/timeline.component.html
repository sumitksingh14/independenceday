<div class="timeline-container">
  <div class="timeline">
    <div class="timeline-item" *ngFor="let item of timelineData; let i = index" [ngClass]="{'left': i % 2 === 0, 'right': i % 2 !== 0}">
      <div class="timeline-content glass-card" [class.expanded]="expandedIndex === i" (click)="toggleExpand(i)">
        <div class="timeline-icon">
          <i class="fa-solid {{item.icon}}"></i>
        </div>
        <div class="timeline-year">{{ item.year }}</div>
        <h3 class="timeline-title">{{ item.title }}</h3>
        
        <div class="timeline-details" *ngIf="expandedIndex === i">
          <p class="timeline-desc">{{ item.description }}</p>
          <div class="timeline-image" *ngIf="item.image" style="margin-top: 1rem; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            <img [src]="item.image" [alt]="item.title" style="width: 100%; height: auto; max-height: 250px; object-fit: cover; border-radius: 8px; display: block;">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
