<div class="page-container fade-in">
  <div class="page-header text-center">
    <h1 class="heading-primary text-gradient">{{ t?.contact?.pageTitle || 'Contact Us' }}</h1>
    <p class="subtitle">{{ t?.contact?.pageSubtitle || 'We\'d love to hear from you' }}</p>
  </div>

  <div class="container contact-container">
      <!-- Contact Form -->
      <div class="glass-card form-card" style="max-width: 600px; margin: 0 auto;">
        <div class="success-message" *ngIf="isSubmitted">
          <i class="fa-solid fa-circle-check"></i>
          <p>{{ t?.contact?.successMessage || 'Thank you for your message. Happy Independence Day!' }}</p>
        </div>

        <form (submit)="onSubmit($event)" [class.hidden]="isSubmitted">
          <div class="form-group">
            <label for="name">{{ t?.contact?.nameLabel || 'Name' }}</label>
            <input type="text" id="name" name="name" [placeholder]="t?.contact?.namePlaceholder || 'Your Name'" required class="form-control">
          </div>

          <div class="form-group">
            <label for="email">{{ t?.contact?.emailLabel || 'Email' }}</label>
            <input type="email" id="email" name="email" [placeholder]="t?.contact?.emailPlaceholder || 'Your Email'" required class="form-control">
          </div>

          <div class="form-group">
            <label for="message">{{ t?.contact?.messageLabel || 'Message' }}</label>
            <textarea id="message" name="message" [placeholder]="t?.contact?.messagePlaceholder || 'Your Message'" rows="5" required class="form-control"></textarea>
          </div>

          <button type="submit" class="btn btn-primary submit-btn">
            {{ t?.contact?.send || 'Send Message' }} <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>
  </div>
</div>
