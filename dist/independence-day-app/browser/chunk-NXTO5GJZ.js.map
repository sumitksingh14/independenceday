<div class="page-container fade-in">
  <div class="page-header text-center">
    <h1 class="heading-primary text-gradient">Inspirational Stories</h1>
    <p class="subtitle">Tales of courage and sacrifice from the freedom struggle</p>
  </div>

  <div class="stories-container container">
    <div class="story-card glass-card" *ngFor="let story of stories; let i = index" [ngClass]="{'reverse': i % 2 !== 0}">
      <div class="story-image">
        <img [src]="story.image" [alt]="story.title">
      </div>
      <div class="story-content">
        <h2>{{ story.title }}</h2>
        <p class="summary">{{ story.summary }}</p>
        <div class="timeline-events">
          <h4>Key Events:</h4>
          <ul>
            <li *ngFor="let event of story.events">{{ event }}</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
